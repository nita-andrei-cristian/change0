        if (hitEdge) {
          state.selectedNode = null;
          state.selectedEdge = hitEdge;
          updateFocusNodeBadge();
          updateCursor();
          return;
        }

        state.selectedNode = hitNode;
        state.selectedEdge = null;
        updateFocusNodeBadge();
        updateCursor();
      }

      function onPointerDown(event) {
        if (event.button !== 0) {
          return;
        }

        const rect = canvas.getBoundingClientRect();
        const screenX = event.clientX - rect.left;
        const screenY = event.clientY - rect.top;
        const targetNode = pickNode(screenX, screenY);
        const targetGroup = targetNode ? null : pickGroup(screenX, screenY);

        state.pointer.isDown = true;
        state.pointer.dragging = false;
        state.pointer.pointerId = event.pointerId;
        state.pointer.mode = targetNode ? "node" : targetGroup ? "group" : "camera";
        state.pointer.targetNode = targetNode;
        state.pointer.targetGroup = targetGroup;
        state.pointer.startX = screenX;
        state.pointer.startY = screenY;
        state.pointer.lastX = screenX;
        state.pointer.lastY = screenY;
        canvas.setPointerCapture(event.pointerId);
        updateHover(screenX, screenY);
      }

      function onPointerMove(event) {
        const rect = canvas.getBoundingClientRect();
        const screenX = event.clientX - rect.left;
        const screenY = event.clientY - rect.top;

        if (state.pointer.isDown) {
          const moveDistance = Math.hypot(screenX - state.pointer.startX, screenY - state.pointer.startY);
          if (!state.pointer.dragging && moveDistance > 4) {
            state.pointer.dragging = true;
          }

          if (state.pointer.dragging) {
            const scene = getSceneTransform();
            const previousWorld = screenToWorld(state.pointer.lastX, state.pointer.lastY, scene);
            const currentWorld = screenToWorld(screenX, screenY, scene);
            const deltaWorldX = currentWorld.x - previousWorld.x;
            const deltaWorldY = currentWorld.y - previousWorld.y;

            if (state.pointer.mode === "node" && state.pointer.targetNode) {
              const node = state.pointer.targetNode;
              node.x += deltaWorldX;
              node.y += deltaWorldY;
              node.pinX = node.x;
              node.pinY = node.y;
              node.pinned = true;
              node.vx = 0;
              node.vy = 0;
            } else if (state.pointer.mode === "group" && state.pointer.targetGroup) {
              const group = state.pointer.targetGroup;
              group.anchorX += deltaWorldX;
              group.anchorY += deltaWorldY;
              group.centerX += deltaWorldX;
              group.centerY += deltaWorldY;

              for (const node of group.members) {
                node.x += deltaWorldX;
                node.y += deltaWorldY;
                if (node.pinned) {
                  node.pinX += deltaWorldX;
                  node.pinY += deltaWorldY;
                }
                node.vx = 0;
                node.vy = 0;
              }
            } else {
              const dx = screenX - state.pointer.lastX;
              const dy = screenY - state.pointer.lastY;
              state.camera.x -= dx / Math.max(state.camera.scale, 0.001);
              state.camera.y -= dy / Math.max(state.camera.scale, 0.001);
            }

            state.hoveredNode = null;
            state.hoveredEdge = null;
            state.hoveredGroup = null;
            updateCursor();
          } else {
            updateHover(screenX, screenY);
          }
        } else {
          updateHover(screenX, screenY);
        }

        state.pointer.lastX = screenX;
        state.pointer.lastY = screenY;
      }

      function endPointer(event) {
        const rect = canvas.getBoundingClientRect();
        const screenX = event.clientX - rect.left;
        const screenY = event.clientY - rect.top;
        const wasDragging = state.pointer.dragging;

        state.pointer.isDown = false;
        state.pointer.dragging = false;

        if (state.pointer.pointerId !== null) {
          canvas.releasePointerCapture(state.pointer.pointerId);
          state.pointer.pointerId = null;
        }

        state.pointer.mode = "camera";
        state.pointer.targetNode = null;
        state.pointer.targetGroup = null;

        if (!wasDragging) {
          handleCanvasClick(screenX, screenY);
        }

        updateHover(screenX, screenY);
      }

      function onPointerCancel() {
        state.pointer.isDown = false;
        state.pointer.dragging = false;
        state.pointer.pointerId = null;
        state.pointer.mode = "camera";
        state.pointer.targetNode = null;
        state.pointer.targetGroup = null;
        state.hoveredNode = null;
        state.hoveredEdge = null;
        state.hoveredGroup = null;
        updateCursor();
      }

      function onWheel(event) {
        event.preventDefault();
        state.camera.x += event.deltaX / Math.max(state.camera.scale, 0.001);
        state.camera.y += event.deltaY / Math.max(state.camera.scale, 0.001);
      }

      function onPointerLeave() {
        if (!state.pointer.isDown) {
          state.hoveredNode = null;
          state.hoveredEdge = null;
          state.hoveredGroup = null;
          updateCursor();
        }
      }

      async function manualConnectResearch(forceReconnect = true) {
        const id = researchState.activeResearchId || researchState.connectedResearchId || ensurePreparedResearchId();

        if (researchState.activeResearchId !== id) {
          researchState.runStateLabel = "Idle";
          resetResearchLog(id);
          renderResearchLog();
        }

        try {
          await connectResearchStream(id, forceReconnect);
        } catch (error) {
          console.error(error);
          researchState.connectionState = "error";
          researchState.runStateLabel = "Idle";
          researchState.statusDetail = buildResearchTransportMessage(error);
          updateResearchPanel();
        }
      }

      async function startDeepSearch(event) {
        event.preventDefault();

        const { taskName, minRounds } = readResearchForm();
        const id = ensurePreparedResearchId();

        if (taskName.length === 0) {
          researchState.connectionState = researchState.eventSource ? researchState.connectionState : "disconnected";
          researchState.runStateLabel = "Idle";
          researchState.statusDetail = "Task Name is required for /research/start.";
          updateResearchPanel();
          researchTaskInput.focus();
          return;
        }

        researchState.startInFlight = true;
        researchState.runStateLabel = "Starting";
        researchState.activeResearchId = id;
        researchState.statusDetail = "Preparing deep search.";
        resetResearchLog(id);
        renderResearchLog();
        updateResearchPanel();

        try {
          await connectResearchStream(id, researchState.connectedResearchId !== id || researchState.connectionState !== "connected");

          researchState.statusDetail = `POST ${RESEARCH_START_ENDPOINT}`;
          updateResearchPanel();

          const response = await fetch(RESEARCH_START_ENDPOINT, {
            method: "POST",
            cache: "no-store",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              id,
              taskName,
              minRounds
            })
          });

          const responseText = await response.text();
          if (!response.ok) {
            throw new Error(responseText || `HTTP ${response.status}`);
          }

          if (researchState.runStateLabel === "Starting" || researchState.runStateLabel === "Running") {
            researchState.runStateLabel = "Completed";
          }

          researchState.statusDetail = responseText.trim().length > 0
            ? "Deep search completed and HTTP response returned."
            : "Deep search completed.";
          researchState.preparedResearchId = "";
          updateResearchPanel();
          loadGraph();
        } catch (error) {
          console.error(error);
          researchState.connectionState = researchState.eventSource ? researchState.connectionState : "error";
          researchState.runStateLabel = "Error";
          researchState.statusDetail = buildResearchTransportMessage(error);
          updateResearchPanel();
        } finally {
          researchState.startInFlight = false;
          updateResearchPanel();
        }
      }

      async function loadGraph() {
        const requestSerial = state.requestSerial + 1;
        state.requestSerial = requestSerial;
        state.loading = true;
        state.error = null;
        updateRefreshButton();
        updateExplodeButton();

        try {
          const response = await fetch(GRAPH_ENDPOINT, { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`Server responded with HTTP ${response.status}`);
          }

          const raw = await response.json();
          if (!raw || !Array.isArray(raw.nodes) || !Array.isArray(raw.connections)) {
            throw new Error("Invalid graph payload from server");
          }

          if (requestSerial !== state.requestSerial) {
            return;
          }

          const parsed = parseNodes(raw.nodes);
          const nextNodeById = parsed.nodeById;
          const previousFocusPath = state.focusPath.slice();
          const previousSelectedNode = state.selectedNode;

          state.allNodes = parsed.nodes;
          state.nodeById = nextNodeById;
          state.roots = state.allNodes.filter((node) => node.hasParent === false);
          state.childrenByParent = buildChildrenByParent(state.allNodes);
          annotateHierarchy(state.allNodes);
          assignColors(state.allNodes, state.nodeById);
          state.allEdges = buildEdges(raw.connections, state.nodeById);
          state.focusPath = remapFocusPath(previousFocusPath, nextNodeById);
          state.selectedNode = remapNode(previousSelectedNode, nextNodeById);
          state.selectedEdge = null;
          state.hoveredNode = null;
          state.hoveredEdge = null;
          state.hoveredGroup = null;

          console.log("ALL NODES", state.allNodes.map(summarizeNode));
          console.log("ROOT NODES", state.roots.map(summarizeNode));
          console.log(
            "CHILDREN BY PARENT",
            Array.from(state.childrenByParent.entries()).map(([parentId, children]) => ({
              parentId,
              children: children.map(summarizeNode)
            }))
          );

          state.loading = false;
          state.error = null;
          updateRefreshButton();
          recomputeVisibleGraph();
          updateCursor();
        } catch (error) {
          if (requestSerial !== state.requestSerial) {
            return;
          }

          console.error(error);
          state.loading = false;
          state.error = buildGraphLoadError(error);
          updateRefreshButton();
          updateExplodeButton();
          updateCursor();
        }
      }

      function frame(now) {
        const delta = clamp((now - state.lastFrame) / 16.6667, 0.5, 1.8);
        state.lastFrame = now;
        stepLayout(delta);
        render();
        requestAnimationFrame(frame);
      }

      refreshButton.addEventListener("click", () => {
        loadGraph();
      });

      connectResearchButton.addEventListener("click", () => {
        manualConnectResearch(true);
      });

      toggleEventReferenceButton.addEventListener("click", () => {
        eventReferencePanel.hidden = !eventReferencePanel.hidden;
        updateEventReferenceToggle();
      });

      researchForm.addEventListener("submit", startDeepSearch);
      researchTaskInput.addEventListener("input", updateResearchPanel);
      researchMinRoundsInput.addEventListener("input", updateResearchPanel);

      explodeToggle.addEventListener("click", () => {
        state.explodeMode = !state.explodeMode;
        state.selectedNode = null;
        state.selectedEdge = null;
        state.hoveredNode = null;
        state.hoveredEdge = null;
        recomputeVisibleGraph({
          pulseAnchor: {
            x: state.width - 120,
            y: 44,
            amplitude: 0.16,
            duration: 220
          }
        });
        updateCursor();
      });

      canvas.addEventListener("pointerdown", onPointerDown);
      canvas.addEventListener("pointermove", onPointerMove);
      canvas.addEventListener("pointerup", endPointer);
      canvas.addEventListener("pointercancel", onPointerCancel);
      canvas.addEventListener("pointerleave", onPointerLeave);
      canvas.addEventListener("wheel", onWheel, { passive: false });

      window.addEventListener("resize", resizeCanvas);
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          if (!stepBackOneLevel()) {
            state.selectedNode = null;
            state.selectedEdge = null;
            state.hoveredNode = null;
            state.hoveredEdge = null;
            state.hoveredGroup = null;
            updateFocusNodeBadge();
          }
          updateCursor();
        }
      });

      resizeCanvas();
      ensurePreparedResearchId();
      renderEventReference();
      renderResearchLog();
      updateEventReferenceToggle();
      updateResearchPanel();
      updateRefreshButton();
      updateExplodeButton();
      loadGraph();
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
