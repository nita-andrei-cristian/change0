<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Graph Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #05070a;
      --panel-bg: #0a0d13;
      --panel-border: rgba(255, 255, 255, 0.1);
      --panel-muted: rgba(255, 255, 255, 0.64);
      --panel-soft: rgba(255, 255, 255, 0.04);
      --panel-soft-strong: rgba(255, 255, 255, 0.08);
      --panel-text: #f5f7fb;
      --accent: #7dd3fc;
      --accent-strong: #38bdf8;
      --danger: #fb7185;
      --success: #34d399;
      --warning: #fbbf24;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      font-family: system-ui, sans-serif;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(320px, 25vw) minmax(0, 1fr);
      width: 100vw;
      height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.12), transparent 28%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 24%),
        var(--bg);
    }

    .sidebar {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background:
        linear-gradient(180deg, rgba(125, 211, 252, 0.08), rgba(125, 211, 252, 0)),
        var(--panel-bg);
      border-right: 1px solid var(--panel-border);
      box-shadow: 18px 0 40px rgba(0, 0, 0, 0.24);
    }

    .sidebar__top {
      padding: 22px 20px 18px;
      border-bottom: 1px solid var(--panel-border);
      overflow: auto;
    }

    .sidebar__eyebrow {
      margin: 0 0 8px;
      color: var(--accent);
      font: 700 11px/1.2 system-ui, sans-serif;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .sidebar__title {
      margin: 0;
      color: var(--panel-text);
      font: 700 24px/1.1 system-ui, sans-serif;
      letter-spacing: -0.03em;
    }

    .sidebar__subtitle,
    .sidebar__hint {
      margin: 10px 0 0;
      color: var(--panel-muted);
      font: 500 13px/1.45 system-ui, sans-serif;
    }

    .research-form {
      margin-top: 18px;
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field__label {
      color: rgba(255, 255, 255, 0.86);
      font: 600 12px/1.2 system-ui, sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .field input,
    .field textarea {
      appearance: none;
      width: 100%;
      box-sizing: border-box;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      padding: 12px 14px;
      color: var(--panel-text);
      background: rgba(255, 255, 255, 0.04);
      font: 500 14px/1.4 system-ui, sans-serif;
      transition: border-color 140ms ease, background 140ms ease, box-shadow 140ms ease;
      resize: vertical;
    }

    .field input:focus,
    .field textarea:focus {
      outline: none;
      border-color: rgba(125, 211, 252, 0.56);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.12);
    }

    .field textarea {
      min-height: 92px;
      max-height: 220px;
    }

    .research-form__actions {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 10px;
    }

    .sidebar-button {
      appearance: none;
      width: 100%;
      min-height: 44px;
      border: 1px solid rgba(125, 211, 252, 0.4);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(56, 189, 248, 0.22), rgba(56, 189, 248, 0.08));
      color: #f8fbff;
      cursor: pointer;
      font: 700 12px/1 system-ui, sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition:
        transform 180ms ease,
        border-color 140ms ease,
        background 140ms ease,
        opacity 140ms ease;
    }

    .sidebar-button:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: rgba(125, 211, 252, 0.64);
      background: linear-gradient(180deg, rgba(56, 189, 248, 0.28), rgba(56, 189, 248, 0.1));
    }

    .sidebar-button:disabled {
      opacity: 0.46;
      cursor: default;
      transform: none;
    }

    .sidebar-button--ghost {
      border-color: rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.92);
    }

    .sidebar-button--ghost:hover:not(:disabled) {
      border-color: rgba(255, 255, 255, 0.28);
      background: rgba(255, 255, 255, 0.08);
    }

    .event-reference-toggle {
      margin-top: 16px;
    }

    .research-status {
      margin-top: 16px;
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.03);
      display: grid;
      gap: 10px;
    }

    .research-status__top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 11px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font: 700 11px/1 system-ui, sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .status-chip::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.36);
      box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.04);
    }

    .status-chip[data-state="connected"]::before {
      background: var(--success);
    }

    .status-chip[data-state="connecting"]::before,
    .status-chip[data-state="reconnecting"]::before {
      background: var(--warning);
    }

    .status-chip[data-state="disconnected"]::before,
    .status-chip[data-state="error"]::before {
      background: var(--danger);
    }

    .status-chip[data-state="running"]::before {
      background: var(--accent-strong);
    }

    .status-meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .status-meta {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .status-meta__label {
      color: rgba(255, 255, 255, 0.5);
      font: 600 10px/1.2 system-ui, sans-serif;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .status-meta__value {
      color: rgba(255, 255, 255, 0.9);
      font: 600 13px/1.35 system-ui, sans-serif;
      word-break: break-word;
    }

    .event-reference {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.03);
      overflow: hidden;
    }

    .event-reference[hidden] {
      display: none;
    }

    .event-reference__list {
      display: grid;
      gap: 10px;
      max-height: 180px;
      overflow: auto;
      padding: 0 14px 14px;
    }

    .event-reference__item {
      display: grid;
      gap: 4px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.02);
    }

    .event-reference__code {
      color: var(--panel-text);
      font: 700 12px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .event-reference__role {
      color: var(--panel-muted);
      font: 500 12px/1.45 system-ui, sans-serif;
    }

    .event-log {
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .event-log__header {
      padding: 16px 20px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.02);
    }

    .event-log__title {
      margin: 0;
      color: var(--panel-text);
      font: 700 15px/1.2 system-ui, sans-serif;
      letter-spacing: 0.02em;
    }

    .event-log__subtitle {
      margin: 6px 0 0;
      color: var(--panel-muted);
      font: 500 12px/1.45 system-ui, sans-serif;
    }

    .event-log__list {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      padding: 14px 14px 24px;
      display: grid;
      align-content: start;
      gap: 12px;
    }

    .event-log__empty {
      padding: 18px;
      border-radius: 18px;
      border: 1px dashed rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.02);
      color: var(--panel-muted);
      font: 500 13px/1.45 system-ui, sans-serif;
    }

    .event-log__entry {
      border-left: 3px solid var(--event-accent, rgba(255, 255, 255, 0.18));
      border-radius: 18px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.04);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      display: grid;
      gap: 10px;
    }

    .event-log__meta {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .event-log__meta-main {
      min-width: 0;
      display: grid;
      gap: 6px;
    }

    .event-log__type-line {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .event-log__badge {
      display: inline-flex;
      align-items: center;
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font: 700 10px/1 system-ui, sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .event-log__type {
      color: var(--panel-text);
      font: 700 13px/1.2 system-ui, sans-serif;
      letter-spacing: 0.01em;
      word-break: break-word;
    }

    .event-log__role {
      color: var(--panel-muted);
      font: 500 12px/1.5 system-ui, sans-serif;
    }

    .event-log__meta-side {
      flex: 0 0 auto;
      text-align: right;
      color: rgba(255, 255, 255, 0.72);
      font: 600 11px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace;
      white-space: nowrap;
    }

    .event-log__id {
      color: rgba(255, 255, 255, 0.48);
      font: 600 11px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace;
      word-break: break-word;
    }

    .event-log__payload {
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(0, 0, 0, 0.22);
      overflow: hidden;
    }

    .event-log__payload summary {
      cursor: pointer;
      padding: 10px 12px;
      color: rgba(255, 255, 255, 0.84);
      font: 700 11px/1 system-ui, sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      list-style: none;
    }

    .event-log__payload summary::-webkit-details-marker {
      display: none;
    }

    .event-log__payload pre {
      margin: 0;
      padding: 0 12px 12px;
      white-space: pre-wrap;
      word-break: break-word;
      color: rgba(255, 255, 255, 0.88);
      font: 500 12px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .graph-shell {
      position: relative;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      background: #000;
    }

    .ui {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 2;
      pointer-events: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: min(420px, calc(100vw - 32px));
      padding: 6px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }

    .ui button {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.04);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      flex: 1 1 0;
      min-width: 0;
      min-height: 42px;
      font: 600 12px/1 system-ui, sans-serif;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 12px 16px;
      border-radius: 999px;
      cursor: pointer;
      transition:
        transform 220ms cubic-bezier(0.2, 0.9, 0.24, 1),
        background 160ms ease,
        border-color 160ms ease,
        opacity 160ms ease,
        box-shadow 220ms ease;
      backdrop-filter: blur(10px);
    }

    .ui button:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .ui button.is-active {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.34);
      transform: translateY(-1px);
      box-shadow: inset 0 0 0 999px rgba(255, 255, 255, 0.04);
    }

    .ui button:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .focus-node {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%) translateY(-6px);
      z-index: 2;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #fff;
      opacity: 0;
      transition: opacity 160ms ease, transform 160ms ease;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
    }

    .focus-node.is-visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .focus-node__ring {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      border: 2px solid currentColor;
      box-sizing: border-box;
      flex: 0 0 auto;
    }

    .focus-node__label {
      font: 600 13px/1 system-ui, sans-serif;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #000;
      touch-action: none;
      cursor: grab;
    }

    @media (max-width: 1180px) {
      .app {
        grid-template-columns: minmax(290px, 36vw) minmax(0, 1fr);
      }
    }

    @media (max-width: 840px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(320px, 44vh) minmax(0, 1fr);
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--panel-border);
      }

      .focus-node {
        top: 14px;
      }

      .ui {
        width: min(420px, calc(100% - 24px));
        bottom: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar__top">
        <h1 class="sidebar__title">Deep Search Hub</h1>

        <form id="research-form" class="research-form">
          <label class="field" for="research-task">
            <span class="field__label">Task Name</span>
            <textarea id="research-task" name="research-task" placeholder="Example: Analyze which nodes and connections support the hypothesis that the user avoids conflict through overcompensation."></textarea>
          </label>

          <label class="field" for="research-min-rounds">
            <span class="field__label">Min Rounds</span>
            <input id="research-min-rounds" name="research-min-rounds" type="number" min="1" step="1" value="2" inputmode="numeric">
          </label>

          <div class="research-form__actions">
            <button id="connect-research" class="sidebar-button sidebar-button--ghost" type="button">Connect SSE</button>
            <button id="start-research" class="sidebar-button" type="submit">Start Deep Search</button>
          </div>
        </form>

        <div class="research-status">
          <div class="research-status__top">
            <span id="research-connection-state" class="status-chip" data-state="disconnected">Disconnected</span>
            <span class="status-meta__value" id="research-run-state">Idle</span>
          </div>

          <div class="status-meta-grid">
            <div class="status-meta">
              <span class="status-meta__label">Last Event</span>
              <strong id="research-last-event" class="status-meta__value">No events yet</strong>
            </div>
            <div class="status-meta">
              <span class="status-meta__label">Log Entries</span>
              <strong id="research-log-count" class="status-meta__value">0</strong>
            </div>
            <div class="status-meta">
              <span class="status-meta__label">Session Routing</span>
              <strong id="research-active-id" class="status-meta__value">Auto-generated</strong>
            </div>
            <div class="status-meta">
              <span class="status-meta__label">Server</span>
              <strong id="research-server" class="status-meta__value">127.0.0.1:8085</strong>
            </div>
          </div>

          <p id="research-status-detail" class="sidebar__hint">Ready.</p>
        </div>

        <button id="toggle-event-reference" class="sidebar-button sidebar-button--ghost event-reference-toggle" type="button" aria-expanded="false">Show Event Reference</button>

        <div id="event-reference-panel" class="event-reference" hidden>
          <div id="event-reference-list" class="event-reference__list"></div>
        </div>
      </div>

      <section class="event-log">
        <div class="event-log__header">
          <h2 class="event-log__title">Events</h2>
        </div>
        <div id="research-log-list" class="event-log__list" aria-live="polite">
          <div class="event-log__empty">No events yet. Connect SSE and start a deep search.</div>
        </div>
      </section>
    </aside>

    <section class="graph-shell">
      <div id="focus-node" class="focus-node" aria-live="polite">
        <span id="focus-node-ring" class="focus-node__ring"></span>
        <span id="focus-node-label" class="focus-node__label"></span>
      </div>
      <div class="ui">
        <button id="refresh-graph" type="button">Refresh Graph</button>
        <button id="explode-toggle" type="button">Explode Layers</button>
      </div>
      <canvas id="graph" aria-label="Interactive graph viewer"></canvas>
    </section>
  </div>
  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("graph");
      const ctx = canvas.getContext("2d");
      const refreshButton = document.getElementById("refresh-graph");
      const explodeToggle = document.getElementById("explode-toggle");
      const researchForm = document.getElementById("research-form");
      const researchTaskInput = document.getElementById("research-task");
      const researchMinRoundsInput = document.getElementById("research-min-rounds");
      const connectResearchButton = document.getElementById("connect-research");
      const startResearchButton = document.getElementById("start-research");
      const toggleEventReferenceButton = document.getElementById("toggle-event-reference");
      const eventReferencePanel = document.getElementById("event-reference-panel");
      const researchConnectionState = document.getElementById("research-connection-state");
      const researchRunState = document.getElementById("research-run-state");
      const researchLastEvent = document.getElementById("research-last-event");
      const researchLogCount = document.getElementById("research-log-count");
      const researchActiveId = document.getElementById("research-active-id");
      const researchServer = document.getElementById("research-server");
      const researchStatusDetail = document.getElementById("research-status-detail");
      const eventReferenceList = document.getElementById("event-reference-list");
      const researchLogList = document.getElementById("research-log-list");
      const focusNodeBadge = document.getElementById("focus-node");
      const focusNodeRing = document.getElementById("focus-node-ring");
      const focusNodeLabel = document.getElementById("focus-node-label");
      const GRAPH_SERVER_HOST = "127.0.0.1";
      const GRAPH_SERVER_PORT = 8085;
      const GRAPH_ENDPOINT = `http://${GRAPH_SERVER_HOST}:${GRAPH_SERVER_PORT}/graph`;
      const RESEARCH_START_ENDPOINT = `http://${GRAPH_SERVER_HOST}:${GRAPH_SERVER_PORT}/research/start`;
      const RESEARCH_EVENTS_ENDPOINT = `http://${GRAPH_SERVER_HOST}:${GRAPH_SERVER_PORT}/research/events`;
      const SERVER_OFFLINE_HINT = "Open CHANGE terminal client and select Start Server (run ./build.sh)";
      const EVENT_TYPE_META = {
        sse_connected: {
          label: "SSE Connected",
          role: "The server confirms that the /research/events stream is attached and can receive messages for this research session.",
          accent: "#34d399"
        },
        research_started: {
          label: "Research Started",
          role: "The HTTP handler accepted /research/start and launched the real deep-search session.",
          accent: "#38bdf8"
        },
        "p-mem": {
          label: "Persistent Memory",
          role: "The persistent deep-search prompt emitted once at the beginning of the session.",
          accent: "#a78bfa"
        },
        "ds-start": {
          label: "Deep Search Start",
          role: "Start marker emitted after RefreshGraph() and immediately before the investigation loop begins.",
          accent: "#60a5fa"
        },
        "round-start": {
          label: "Round Start",
          role: "A new round header appended to the session's dynamic memory.",
          accent: "#f59e0b"
        },
        "ds-model-response": {
          label: "Model Response",
          role: "The raw structured response returned by the deep-search model before command execution.",
          accent: "#22d3ee"
        },
        "cmd-1": {
          label: "Command 1",
          role: "Result of the global top-node search ranked by activation or weight.",
          accent: "#f472b6"
        },
        "cmd-2": {
          label: "Command 2",
          role: "Result of the target-node neighbor search filtered by activation or weight.",
          accent: "#fb7185"
        },
        "cmd-3": {
          label: "Command 3",
          role: "Subgraph or node-family exploration built around a target node at a chosen depth.",
          accent: "#f97316"
        },
        "d-mem": {
          label: "Dynamic Memory",
          role: "Snapshot of accumulated dynamic memory emitted after rounds and again at the end.",
          accent: "#eab308"
        },
        "judge-start": {
          label: "Judge Start",
          role: "The automatic validator starts evaluating the current session conclusion.",
          accent: "#c084fc"
        },
        "judge-pass": {
          label: "Judge Pass",
          role: "The validator accepted the conclusion, so the session can close successfully.",
          accent: "#34d399"
        },
        "judge-fail": {
          label: "Judge Fail",
          role: "The validator rejected the conclusion and sent feedback for another iteration.",
          accent: "#f87171"
        },
        "ds-end": {
          label: "Deep Search End",
          role: "Final conclusion produced by the deep-search session and emitted to the client at the end.",
          accent: "#38bdf8"
        }
      };

      const hasOwn = (value, key) => Object.prototype.hasOwnProperty.call(value, key);
      const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
      const toNumber = (value, fallback = 0) => {
        const parsed = Number(value);
        return Number.isFinite(parsed) ? parsed : fallback;
      };

      const state = {
        allNodes: [],
        roots: [],
        nodeById: new Map(),
        childrenByParent: new Map(),
        allEdges: [],
        focusPath: [],
        explodeMode: false,
        currentLayerParents: [],
        visibleNodes: [],
        visibleEdges: [],
        visibleGroups: [],
        hoveredNode: null,
        hoveredGroup: null,
        hoveredEdge: null,
        selectedNode: null,
        selectedEdge: null,
        loading: true,
        error: null,
        requestSerial: 0,
        width: 0,
        height: 0,
        dpr: 1,
        lastFrame: performance.now(),
        camera: {
          x: 0,
          y: 0,
          scale: 1
        },
        navPulse: null,
        pointer: {
          isDown: false,
          dragging: false,
          pointerId: null,
          mode: "camera",
          targetNode: null,
          targetGroup: null,
          startX: 0,
          startY: 0,
          lastX: 0,
          lastY: 0
        }
      };

      const researchState = {
        eventSource: null,
        connectionState: "disconnected",
        startInFlight: false,
        connectedResearchId: "",
        activeResearchId: "",
        preparedResearchId: "",
        statusDetail: "Ready.",
        runStateLabel: "Idle",
        lastEventLabel: "No events yet",
        events: [],
        firstServerEventPerf: null,
        connectPromise: null,
        connectSerial: 0
      };

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll("\"", "&quot;")
          .replaceAll("'", "&#39;");
      }

      function sanitizeResearchId(value) {
        const cleaned = String(value || "")
          .trim()
          .replace(/[^a-zA-Z0-9_-]/g, "-")
          .replace(/-+/g, "-")
          .replace(/^-|-$/g, "");

        return cleaned.slice(0, 63) || "default";
      }

      function generateResearchId() {
        const timePart = Date.now().toString(36);

        if (window.crypto && typeof window.crypto.getRandomValues === "function") {
          const bytes = new Uint8Array(18);
          window.crypto.getRandomValues(bytes);
          const randomPart = Array.from(bytes, (byte) => byte.toString(16).padStart(2, "0")).join("");
          return sanitizeResearchId(`rs-${timePart}-${randomPart}`);
        }

        const randomPart = Array.from({ length: 5 }, () => (
          Math.floor(Math.random() * 0xffffffff).toString(16).padStart(8, "0")
        )).join("");
        return sanitizeResearchId(`rs-${timePart}-${randomPart}`);
      }

      function ensurePreparedResearchId(forceNew = false) {
        if (forceNew || !researchState.preparedResearchId) {
          researchState.preparedResearchId = generateResearchId();
        }

        return researchState.preparedResearchId;
      }

      function normalizeMinRounds(value) {
        const parsed = Math.trunc(Number(value));
        return Number.isFinite(parsed) && parsed > 0 ? parsed : 2;
      }

      function readResearchForm() {
        const id = ensurePreparedResearchId();
        const taskName = researchTaskInput.value.trim();
        const minRounds = normalizeMinRounds(researchMinRoundsInput.value);

        researchMinRoundsInput.value = String(minRounds);

        return { id, taskName, minRounds };
      }

      function buildResearchEventsUrl(id) {
        return `${RESEARCH_EVENTS_ENDPOINT}?id=${encodeURIComponent(id)}`;
      }

      function formatClock(date) {
        const hours = String(date.getHours()).padStart(2, "0");
        const minutes = String(date.getMinutes()).padStart(2, "0");
        const seconds = String(date.getSeconds()).padStart(2, "0");
        const millis = String(date.getMilliseconds()).padStart(3, "0");
        return `${hours}:${minutes}:${seconds}.${millis}`;
      }

      function formatElapsedMs(value) {
        return `+${(value / 1000).toFixed(3)}s`;
      }

      function formatResearchPayload(value) {
        const text = typeof value === "string" ? value.trim() : String(value ?? "");

        if (!text) {
          return "";
        }

        if ((text.startsWith("{") && text.endsWith("}")) || (text.startsWith("[") && text.endsWith("]"))) {
          try {
            return JSON.stringify(JSON.parse(text), null, 2);
          } catch (error) {
            return text;
          }
        }

        return text;
      }

      function getResearchEventMeta(type) {
        return EVENT_TYPE_META[type] || {
          label: type || "Unknown Event",
          role: "SSE event without an explicit client-side classification.",
          accent: "#94a3b8"
        };
      }

      function resetResearchLog(activeResearchId = researchState.activeResearchId) {
        researchState.activeResearchId = activeResearchId;
        researchState.events = [];
        researchState.firstServerEventPerf = null;
        researchState.lastEventLabel = "Waiting for SSE events";
      }

      function updateResearchPanel() {
        const { taskName } = readResearchForm();

        researchConnectionState.dataset.state = researchState.connectionState;
        researchConnectionState.textContent = (
          researchState.connectionState.charAt(0).toUpperCase() + researchState.connectionState.slice(1)
        );
        researchRunState.textContent = researchState.runStateLabel;
        researchLastEvent.textContent = researchState.lastEventLabel;
        researchLogCount.textContent = String(researchState.events.length);
        researchActiveId.textContent = "Auto-generated";
        researchServer.textContent = `${GRAPH_SERVER_HOST}:${GRAPH_SERVER_PORT}`;
        researchStatusDetail.textContent = researchState.statusDetail;

        connectResearchButton.disabled = researchState.startInFlight || (
          researchState.connectionState === "connecting" || researchState.connectionState === "reconnecting"
        );
        connectResearchButton.textContent = researchState.connectionState === "connected"
          ? "Reconnect SSE"
          : researchState.connectionState === "connecting" || researchState.connectionState === "reconnecting"
            ? "Connecting..."
            : "Connect SSE";

        startResearchButton.disabled = researchState.startInFlight || taskName.length === 0;
        startResearchButton.textContent = researchState.startInFlight
          ? "Running..."
          : "Start Deep Search";
      }

      function updateEventReferenceToggle() {
        const expanded = eventReferencePanel.hidden === false;
        toggleEventReferenceButton.textContent = expanded ? "Hide Event Reference" : "Show Event Reference";
        toggleEventReferenceButton.setAttribute("aria-expanded", String(expanded));
      }

      function renderEventReference() {
        eventReferenceList.innerHTML = Object.entries(EVENT_TYPE_META).map(([type, meta]) => (
          `<div class="event-reference__item">` +
            `<div class="event-reference__code">${escapeHtml(type)}</div>` +
            `<div class="event-reference__role">${escapeHtml(meta.role)}</div>` +
          `</div>`
        )).join("");
      }

      function renderResearchLog() {
        const shouldStickToBottom = (
          researchLogList.scrollHeight - researchLogList.scrollTop - researchLogList.clientHeight
        ) < 120;

        if (researchState.events.length === 0) {
          researchLogList.innerHTML = `<div class="event-log__empty">No events yet. Connect SSE and start a deep search.</div>`;
          return;
        }

        researchLogList.innerHTML = researchState.events.map((entry) => {
          const payload = formatResearchPayload(entry.data);
          const meta = getResearchEventMeta(entry.type);
          const payloadChars = payload.length;
          const payloadOpen = payloadChars <= 420 ? " open" : "";

          return (
            `<article class="event-log__entry" style="--event-accent: ${escapeHtml(meta.accent)};">` +
              `<div class="event-log__meta">` +
                `<div class="event-log__meta-main">` +
                  `<div class="event-log__type-line">` +
                    `<span class="event-log__badge">#${entry.sequence}</span>` +
                    `<span class="event-log__type">${escapeHtml(meta.label)}</span>` +
                  `</div>` +
                  `<div class="event-log__role">${escapeHtml(meta.role)}</div>` +
                `</div>` +
                `<div class="event-log__meta-side">` +
                  `<div>${escapeHtml(entry.receivedClock)}</div>` +
                  `<div>${escapeHtml(entry.elapsedLabel)}</div>` +
                `</div>` +
              `</div>` +
              `<div class="event-log__id">type=${escapeHtml(entry.type)}</div>` +
              `<details class="event-log__payload"${payloadOpen}>` +
                `<summary>Payload · ${payloadChars} chars</summary>` +
                `<pre>${escapeHtml(payload || "(empty)")}</pre>` +
              `</details>` +
            `</article>`
          );
        }).join("");

        if (shouldStickToBottom) {
          researchLogList.scrollTop = researchLogList.scrollHeight;
        }
      }

      function buildResearchTransportMessage(error) {
        const message = error instanceof Error ? error.message : String(error);

        if (error instanceof TypeError || /Failed to fetch|timed out|Could not connect/i.test(message)) {
          return `Research transport unavailable. ${SERVER_OFFLINE_HINT}`;
        }

        return message;
      }

      function updateResearchRunState(type) {
        if (type === "research_started" || type === "ds-start") {
          researchState.runStateLabel = "Running";
          return;
        }

        if (type === "judge-fail") {
          researchState.runStateLabel = "Retrying";
          return;
        }

        if (type === "judge-pass") {
          researchState.runStateLabel = "Validated";
          return;
        }

        if (type === "ds-end") {
          researchState.runStateLabel = "Completed";
          return;
        }
      }

      function recordResearchEvent(payload) {
        const receivedDate = new Date();
        const receivedPerf = performance.now();

        if (researchState.firstServerEventPerf === null) {
          researchState.firstServerEventPerf = receivedPerf;
        }

        const type = typeof payload.type === "string" ? payload.type : "unknown";
        const researchId = typeof payload.id === "string" && payload.id.length > 0
          ? payload.id
          : researchState.connectedResearchId || "default";
        const data = typeof payload.data === "string"
          ? payload.data
          : JSON.stringify(payload.data ?? "");
        const meta = getResearchEventMeta(type);
        const elapsedMs = receivedPerf - researchState.firstServerEventPerf;

        researchState.activeResearchId = researchId;
        researchState.events.push({
          sequence: researchState.events.length + 1,
          type,
          researchId,
          data,
          receivedClock: formatClock(receivedDate),
          elapsedLabel: formatElapsedMs(elapsedMs)
        });
        researchState.lastEventLabel = `${meta.label} @ ${formatClock(receivedDate)}`;
        researchState.statusDetail = meta.role;

        if (type === "sse_connected") {
          researchState.connectionState = "connected";
          researchState.statusDetail = "SSE connected.";
        }

        updateResearchRunState(type);
        renderResearchLog();
        updateResearchPanel();
      }

      function handleResearchMessage(messageEvent) {
        try {
          const payload = JSON.parse(messageEvent.data);
          recordResearchEvent(payload);
        } catch (error) {
          console.error("Failed to parse SSE payload", error, messageEvent.data);
          researchState.connectionState = "error";
          researchState.statusDetail = "Received malformed SSE payload from server.";
          updateResearchPanel();
        }
      }

      function closeResearchStream() {
        if (researchState.eventSource) {
          researchState.eventSource.close();
        }

        researchState.eventSource = null;
        researchState.connectPromise = null;
      }

      function connectResearchStream(researchId, forceReconnect = false) {
        const targetId = sanitizeResearchId(researchId);

        if (!forceReconnect &&
            researchState.eventSource &&
            researchState.connectedResearchId === targetId &&
            researchState.connectionState === "connected") {
          return Promise.resolve();
        }

        if (!forceReconnect &&
            researchState.connectPromise &&
            researchState.connectedResearchId === targetId) {
          return researchState.connectPromise;
        }

        closeResearchStream();

        researchState.connectSerial += 1;
        const currentConnectSerial = researchState.connectSerial;
        const streamUrl = buildResearchEventsUrl(targetId);

        researchState.connectedResearchId = targetId;
        researchState.activeResearchId = targetId;
        researchState.connectionState = "connecting";
        researchState.statusDetail = "Connecting SSE stream.";
        updateResearchPanel();

        const source = new EventSource(streamUrl);
        researchState.eventSource = source;

        researchState.connectPromise = new Promise((resolve, reject) => {
          let settled = false;
          const timeoutId = window.setTimeout(() => {
            if (settled || researchState.connectSerial !== currentConnectSerial) {
              return;
            }

            settled = true;
            closeResearchStream();
            researchState.connectionState = "error";
            researchState.statusDetail = `SSE connection timed out. ${SERVER_OFFLINE_HINT}`;
            updateResearchPanel();
            reject(new Error("Timed out while connecting SSE."));
          }, 5000);

          function settleSuccess() {
            if (settled || researchState.connectSerial !== currentConnectSerial) {
              return;
            }

            settled = true;
            window.clearTimeout(timeoutId);
            researchState.connectPromise = null;
            resolve();
          }

          function settleFailure(message) {
            if (settled || researchState.connectSerial !== currentConnectSerial) {
              return;
            }

            settled = true;
            window.clearTimeout(timeoutId);
            researchState.connectPromise = null;
            reject(new Error(message));
          }

          source.onopen = () => {
            if (researchState.eventSource !== source) {
              return;
            }

            researchState.connectionState = "connected";
            researchState.statusDetail = "SSE connected.";
            updateResearchPanel();
            settleSuccess();
          };

          source.onmessage = (messageEvent) => {
            if (researchState.eventSource !== source) {
              return;
            }

            handleResearchMessage(messageEvent);
          };

          source.onerror = () => {
            if (researchState.eventSource !== source) {
              return;
            }

            if (source.readyState === EventSource.CONNECTING) {
              researchState.connectionState = "reconnecting";
              researchState.statusDetail = "Reconnecting SSE stream.";
              updateResearchPanel();
              return;
            }

            researchState.connectionState = "error";
            researchState.statusDetail = `SSE connection closed. ${SERVER_OFFLINE_HINT}`;
            closeResearchStream();
            updateResearchPanel();
            settleFailure("Could not connect SSE.");
          };
        });

        return researchState.connectPromise;
      }

      function generatedColorFromId(id) {
        const hue = ((id * 137.508) % 360 + 360) % 360;
        return `hsl(${hue.toFixed(3)} 68% 58%)`;
      }

      function computeNodeRadius(node) {
        const emphasis = clamp((Math.abs(node.activation) + Math.abs(node.weight)) * 0.5, 0.6, 2.2);
        return clamp(14 + emphasis * 6, 18, 30);
      }

      function summarizeNode(node) {
        return {
          id: node.id,
          name: node.name,
          hasParent: node.hasParent,
          parentId: node.parentId,
          color: node.color
        };
      }

      function normalizeMessageLines(detail) {
        if (Array.isArray(detail)) {
          return detail.filter((line) => typeof line === "string" && line.trim().length > 0);
        }

        if (typeof detail === "string" && detail.trim().length > 0) {
          return [detail];
        }

        return [];
      }

      function wrapTextLine(text, font, maxWidth) {
        const value = typeof text === "string" ? text.trim() : "";
        if (value.length === 0) {
          return [];
        }

        const words = value.split(/\s+/);
        const lines = [];
        let currentLine = "";

        ctx.save();
        ctx.font = font;

        for (const word of words) {
          const candidate = currentLine ? `${currentLine} ${word}` : word;
          if (currentLine && ctx.measureText(candidate).width > maxWidth) {
            lines.push(currentLine);
            currentLine = word;
          } else {
            currentLine = candidate;
          }
        }

        if (currentLine) {
          lines.push(currentLine);
        }

        ctx.restore();
        return lines;
      }

      function remapNode(node, nodeById) {
        if (!node || !Number.isFinite(node.id)) {
          return null;
        }

        return nodeById.get(node.id) || null;
      }

      function remapFocusPath(path, nodeById) {
        const remappedPath = [];

        for (const item of path) {
          const node = remapNode(item, nodeById);
          if (!node) {
            break;
          }

          if (remappedPath.length > 0) {
            const parent = remappedPath[remappedPath.length - 1];
            if (node.parentId !== parent.id) {
              break;
            }
          }

          remappedPath.push(node);
        }

        return remappedPath;
      }

      function createErrorState(title, details) {
        return {
          title,
          details: normalizeMessageLines(details)
        };
      }

      function buildGraphLoadError(error) {
        if (error instanceof TypeError) {
          return createErrorState("Graph server unavailable", [
            `Could not reach ${GRAPH_ENDPOINT}`,
            SERVER_OFFLINE_HINT
          ]);
        }

        const message = error instanceof Error ? error.message : String(error);
        return createErrorState("Failed to load graph", message);
      }

      function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        state.width = Math.max(1, Math.round(rect.width));
        state.height = Math.max(1, Math.round(rect.height));
        state.dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
        canvas.width = Math.round(state.width * state.dpr);
        canvas.height = Math.round(state.height * state.dpr);
        ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
      }

      function parseNodes(rawNodes) {
        const nodes = [];
        const nodeById = new Map();

        for (const item of rawNodes) {
          const id = Number(item.id);
          if (!Number.isFinite(id)) {
            console.warn("Skipping node with invalid numeric id", item);
            continue;
          }

          if (nodeById.has(id)) {
            console.warn("Skipping duplicate node id", item);
            continue;
          }

          const hasParent = hasOwn(item, "parent");
          const parsedParentId = hasParent ? Number(item.parent) : null;
          const node = {
            raw: item,
            id,
            name: typeof item.name === "string" ? item.name : String(id),
            activation: toNumber(item.activation, 0),
            weight: toNumber(item.weight, 0),
            hasParent,
            parentId: hasParent && Number.isFinite(parsedParentId) ? parsedParentId : null,
            isRoot: hasParent === false,
            baseColor: null,
            color: null,
            radius: 0,
            x: 0,
            y: 0,
            vx: 0,
            vy: 0,
            pinned: false,
            pinX: 0,
            pinY: 0,
            layoutGroupId: null,
            seed: ((id * 9301 + 49297) % 233280) / 233280
          };

          node.radius = computeNodeRadius(node);
          nodes.push(node);
          nodeById.set(id, node);
        }

        nodes.sort((a, b) => a.id - b.id);
        return { nodes, nodeById };
      }

      function buildChildrenByParent(nodes) {
        const childrenByParent = new Map();

        for (const node of nodes) {
          if (node.hasParent !== true || !Number.isFinite(node.parentId)) {
            continue;
          }

          if (!childrenByParent.has(node.parentId)) {
            childrenByParent.set(node.parentId, []);
          }

          childrenByParent.get(node.parentId).push(node);
        }

        for (const children of childrenByParent.values()) {
          children.sort((a, b) => a.id - b.id);
        }

        return childrenByParent;
      }

      function assignColors(nodes, nodeById) {
        const resolving = new Set();

        function resolveColor(node) {
          if (node.color) {
            return node.color;
          }

          if (node.hasParent === false) {
            node.baseColor = generatedColorFromId(node.id);
            node.color = node.baseColor;
            return node.color;
          }

          if (resolving.has(node.id)) {
            node.baseColor = generatedColorFromId(node.id);
            node.color = node.baseColor;
            return node.color;
          }

          resolving.add(node.id);
          const parent = Number.isFinite(node.parentId) ? nodeById.get(node.parentId) : null;

          if (!parent) {
            node.baseColor = generatedColorFromId(node.id);
            node.color = node.baseColor;
          } else {
            const parentColor = resolveColor(parent);
            node.baseColor = parent.baseColor || parentColor;
            node.color = node.baseColor;
          }

          resolving.delete(node.id);
          return node.color;
        }

        for (const node of nodes) {
          resolveColor(node);
        }
      }

      function buildEdges(rawConnections, nodeById) {
        const edges = [];

        for (const item of rawConnections) {
          if (!item || !Array.isArray(item.nodes) || item.nodes.length !== 2) {
            continue;
          }

          const sourceId = Number(item.nodes[0]);
          const targetId = Number(item.nodes[1]);

          if (!Number.isFinite(sourceId) || !Number.isFinite(targetId)) {
            continue;
          }

          const source = nodeById.get(sourceId);
          const target = nodeById.get(targetId);
          if (!source || !target || source === target) {
            continue;
          }

          edges.push({
            source,
            target,
            weight: clamp(toNumber(item.weight, 1), 0.1, 5),
            activation: clamp(toNumber(item.activation, 1), 0.1, 5)
          });
        }

        return edges;
      }

      function annotateHierarchy(nodes) {
        const memo = new Map();

        function visit(nodeId) {
          if (memo.has(nodeId)) {
            return memo.get(nodeId);
          }

          const children = state.childrenByParent.get(nodeId) || [];
          let descendantCount = children.length;
          let subtreeDepth = children.length > 0 ? 1 : 0;

          for (const child of children) {
            const childMeta = visit(child.id);
            descendantCount += childMeta.descendantCount;
            subtreeDepth = Math.max(subtreeDepth, childMeta.subtreeDepth + 1);
          }

          const meta = {
            directChildCount: children.length,
            descendantCount,
            subtreeDepth
          };
          memo.set(nodeId, meta);
          return meta;
        }

        for (const node of nodes) {
          const meta = visit(node.id);
          node.directChildCount = meta.directChildCount;
          node.descendantCount = meta.descendantCount;
          node.subtreeDepth = meta.subtreeDepth;
        }
      }

      function getFocusNode() {
        return state.focusPath.length === 0 ? null : state.focusPath[state.focusPath.length - 1];
      }

      function nodeHasChildren(node) {
        return Boolean(node && node.directChildCount > 0);
      }

      function getBreadcrumbLabel() {
        return state.focusPath.map((node) => node.name).join(" > ");
      }

      function getActiveDisplayNode() {
        return state.selectedNode || getFocusNode();
      }

      function updateFocusNodeBadge() {
        const activeNode = getActiveDisplayNode();

        if (!activeNode) {
          focusNodeBadge.classList.remove("is-visible");
          focusNodeLabel.textContent = "";
          return;
        }

        focusNodeBadge.classList.add("is-visible");
        focusNodeBadge.style.color = activeNode.color;
        focusNodeRing.style.borderColor = activeNode.color;
        focusNodeLabel.textContent = activeNode.name;
      }

      function getCurrentLayerParents() {
        const focusNode = getFocusNode();
        return focusNode === null
          ? state.roots.slice()
          : (state.childrenByParent.get(focusNode.id) || []).slice();
      }

      function buildExplodedGroups(parents) {
        const groups = [];

        for (const parent of parents) {
          const members = (state.childrenByParent.get(parent.id) || []).slice();
          if (members.length === 0) {
            continue;
          }

          groups.push({
            id: parent.id,
            parent,
            color: parent.color,
            members,
            anchorX: 0,
            anchorY: 0,
            targetRadius: 0,
            centerX: 0,
            centerY: 0,
            radius: 0
          });
        }

        groups.sort((a, b) => a.parent.id - b.parent.id);
        return groups;
      }

      function clearNodeKinematics(nodes) {
        for (const node of nodes) {
          node.vx = 0;
          node.vy = 0;
        }
      }

      function seedCompactLayout(nodes, centerX = 0, centerY = 0, spread = null) {
        const count = nodes.length;
        if (count === 0) {
          return;
        }

        const averageRadius = nodes.reduce((sum, node) => sum + node.radius, 0) / count;
        const spacing = spread === null
          ? clamp(averageRadius * 2.35, 40, 68)
          : clamp(spread * 0.2, 24, 40);
        const maxDistance = spread === null ? Infinity : spread;
        const goldenAngle = Math.PI * (3 - Math.sqrt(5));

        for (let index = 0; index < count; index += 1) {
          const node = nodes[index];
          const distance = count === 1 ? 0 : Math.min(spacing * Math.sqrt(index + 0.45), maxDistance);
          const angle = count === 1 ? -Math.PI * 0.5 : index * goldenAngle + node.seed * 0.75;
          node.x = centerX + Math.cos(angle) * distance;
          node.y = centerY + Math.sin(angle) * distance;
          node.vx = 0;
          node.vy = 0;
          node.layoutGroupId = null;
        }
      }

      function seedExplodedLayout(groups) {
        const count = groups.length;
        if (count === 0) {
          return;
        }

        const ringRadius = clamp(140 + count * 32, 180, 420);

        for (let index = 0; index < count; index += 1) {
          const group = groups[index];
          const angle = count === 1
            ? -Math.PI * 0.5
            : -Math.PI * 0.5 + (Math.PI * 2 * index) / count + (group.parent.seed - 0.5) * 0.22;

          group.anchorX = Math.cos(angle) * ringRadius;
          group.anchorY = Math.sin(angle) * ringRadius * 0.72;
          group.targetRadius = clamp(84 + Math.sqrt(group.members.length) * 26, 92, 210);

          seedCompactLayout(
            group.members,
            group.anchorX,
            group.anchorY,
            group.targetRadius * 0.45
          );

          for (const member of group.members) {
            member.layoutGroupId = group.id;
          }
        }
      }

      function refreshGroupGeometry() {
        for (const group of state.visibleGroups) {
          if (group.members.length === 0) {
            group.centerX = group.anchorX;
            group.centerY = group.anchorY;
            group.radius = group.targetRadius;
            continue;
          }

          let sumX = 0;
          let sumY = 0;

          for (const node of group.members) {
            sumX += node.x;
            sumY += node.y;
          }

          const averageX = sumX / group.members.length;
          const averageY = sumY / group.members.length;
          group.centerX = averageX * 0.72 + group.anchorX * 0.28;
          group.centerY = averageY * 0.72 + group.anchorY * 0.28;

          let radius = group.targetRadius;
          for (const node of group.members) {
            const dx = node.x - group.centerX;
            const dy = node.y - group.centerY;
            radius = Math.max(radius, Math.sqrt(dx * dx + dy * dy) + node.radius + 22);
          }

          group.radius = radius;
        }
      }

      function computeDefaultScale() {
        const count = Math.max(1, state.visibleNodes.length);
        if (state.explodeMode) {
          return clamp(1.04 - Math.sqrt(count) * 0.03, 0.54, 0.86);
        }

        if (getFocusNode() !== null) {
          return clamp(1.12 - Math.sqrt(count) * 0.015, 0.8, 1.08);
        }

        return clamp(1.0 - Math.sqrt(count) * 0.012, 0.88, 0.98);
      }

      function setCameraForCurrentView() {
        state.camera.x = 0;
        state.camera.y = 0;
        state.camera.scale = computeDefaultScale();
      }

      function startPulse(anchorX, anchorY, amplitude = 0.24, duration = 280) {
        state.navPulse = {
          start: performance.now(),
          duration,
          amplitude,
          anchorX,
          anchorY
        };
      }

      function getSceneTransform(now = performance.now()) {
        if (!state.navPulse) {
          return {
            pulseMultiplier: 1,
            anchorX: state.width * 0.5,
            anchorY: state.height * 0.5,
            totalScale: state.camera.scale
          };
        }

        const elapsed = now - state.navPulse.start;
        const progress = elapsed / state.navPulse.duration;

        if (progress >= 1) {
          const anchorX = state.navPulse.anchorX;
          const anchorY = state.navPulse.anchorY;
          state.navPulse = null;
          return {
            pulseMultiplier: 1,
            anchorX,
            anchorY,
            totalScale: state.camera.scale
          };
        }

        const eased = Math.sin(progress * Math.PI);
        const pulseMultiplier = 1 + state.navPulse.amplitude * eased;
        return {
          pulseMultiplier,
          anchorX: state.navPulse.anchorX,
          anchorY: state.navPulse.anchorY,
          totalScale: state.camera.scale * pulseMultiplier
        };
      }

      function worldToScreen(worldX, worldY, scene = getSceneTransform()) {
        const baseX = (worldX - state.camera.x) * state.camera.scale + state.width * 0.5;
        const baseY = (worldY - state.camera.y) * state.camera.scale + state.height * 0.5;

        return {
          x: scene.anchorX + (baseX - scene.anchorX) * scene.pulseMultiplier,
          y: scene.anchorY + (baseY - scene.anchorY) * scene.pulseMultiplier
        };
      }

      function screenToWorld(screenX, screenY, scene = getSceneTransform()) {
        const baseX = scene.anchorX + (screenX - scene.anchorX) / scene.pulseMultiplier;
        const baseY = scene.anchorY + (screenY - scene.anchorY) / scene.pulseMultiplier;

        return {
          x: state.camera.x + (baseX - state.width * 0.5) / state.camera.scale,
          y: state.camera.y + (baseY - state.height * 0.5) / state.camera.scale
        };
      }

      function updateExplodeButton() {
        const hasGraph = state.allNodes.length > 0;
        const hasDeeperLayer = getCurrentLayerParents().some((parent) => {
          const children = state.childrenByParent.get(parent.id);
          return Array.isArray(children) && children.length > 0;
        });

        explodeToggle.textContent = state.explodeMode ? "Collapse Layers" : "Explode Layers";
        explodeToggle.classList.toggle("is-active", state.explodeMode);
        explodeToggle.setAttribute("aria-pressed", String(state.explodeMode));
        explodeToggle.disabled = state.loading || state.error !== null || hasGraph === false || (
          state.explodeMode === false && hasDeeperLayer === false
        );
      }

      function updateRefreshButton() {
        refreshButton.disabled = state.loading;
        refreshButton.textContent = state.loading ? "Refreshing..." : "Refresh Graph";
      }

      function recomputeVisibleGraph(options = {}) {
        const currentLayerParents = getCurrentLayerParents();
        state.currentLayerParents = currentLayerParents;

        let visibleNodes;
        let visibleGroups;

        if (state.explodeMode) {
          visibleGroups = buildExplodedGroups(currentLayerParents);
          visibleNodes = visibleGroups.flatMap((group) => group.members);
        } else {
          visibleGroups = [];
          visibleNodes = currentLayerParents.slice();
          for (const node of visibleNodes) {
            node.layoutGroupId = null;
          }
        }

        const visibleIds = new Set(visibleNodes.map((node) => node.id));
        const visibleEdges = state.allEdges.filter((edge) => (
          visibleIds.has(edge.source.id) && visibleIds.has(edge.target.id)
        ));

        state.visibleGroups = visibleGroups;
        state.visibleNodes = visibleNodes;
        state.visibleEdges = visibleEdges;

        for (const node of state.visibleNodes) {
          node.pinned = false;
          node.pinX = node.x;
          node.pinY = node.y;
        }

        if (state.hoveredNode && !visibleIds.has(state.hoveredNode.id)) {
          state.hoveredNode = null;
        }

        if (state.hoveredGroup && !state.visibleGroups.some((group) => group.id === state.hoveredGroup.id)) {
          state.hoveredGroup = null;
        }

        if (state.hoveredEdge && !state.visibleEdges.includes(state.hoveredEdge)) {
          state.hoveredEdge = null;
        }

        if (state.selectedNode && !visibleIds.has(state.selectedNode.id)) {
          state.selectedNode = null;
        }

        if (state.selectedEdge && !state.visibleEdges.includes(state.selectedEdge)) {
          state.selectedEdge = null;
        }

        if (state.explodeMode) {
          seedExplodedLayout(state.visibleGroups);
          refreshGroupGeometry();
        } else {
          seedCompactLayout(state.visibleNodes);
        }

        clearNodeKinematics(state.visibleNodes);
        setCameraForCurrentView();
        updateExplodeButton();
        updateFocusNodeBadge();
        console.log("VISIBLE NODES", state.visibleNodes.map(summarizeNode));

        if (options.pulseAnchor) {
          startPulse(
            options.pulseAnchor.x,
            options.pulseAnchor.y,
            options.pulseAnchor.amplitude,
            options.pulseAnchor.duration
          );
        }
      }

      function stepLayout(delta) {
        const nodes = state.visibleNodes;
        if (nodes.length === 0) {
          return;
        }

        const exploded = state.explodeMode && state.visibleGroups.length > 0;
        const repulsionBase = exploded ? 2400 : nodes.length > 24 ? 2500 : 2200;

        for (let i = 0; i < nodes.length; i += 1) {
          const a = nodes[i];

          for (let j = i + 1; j < nodes.length; j += 1) {
            const b = nodes[j];
            let dx = b.x - a.x;
            let dy = b.y - a.y;

            if (dx === 0 && dy === 0) {
              const angle = (a.seed + b.seed) * Math.PI * 2;
              dx = Math.cos(angle) * 0.01;
              dy = Math.sin(angle) * 0.01;
            }

            const sameGroup = exploded && a.layoutGroupId !== null && a.layoutGroupId === b.layoutGroupId;
            const distanceSquared = Math.max(dx * dx + dy * dy, 0.01);
            const distance = Math.sqrt(distanceSquared);
            const nx = dx / distance;
            const ny = dy / distance;
            const repulsion = repulsionBase * (sameGroup ? 0.76 : exploded ? 1.45 : 1);

            a.vx -= nx * (repulsion / distanceSquared) * delta;
            a.vy -= ny * (repulsion / distanceSquared) * delta;
            b.vx += nx * (repulsion / distanceSquared) * delta;
            b.vy += ny * (repulsion / distanceSquared) * delta;

            const minDistance = a.radius + b.radius + (sameGroup ? 10 : exploded ? 18 : 12);
            if (distance < minDistance) {
              const push = (minDistance - distance) * 0.18;
              a.x -= nx * push;
              a.y -= ny * push;
              b.x += nx * push;
              b.y += ny * push;
            }

            if (state.hoveredNode && (a === state.hoveredNode || b === state.hoveredNode)) {
              const hoveredNode = state.hoveredNode;
              const otherNode = hoveredNode === a ? b : a;
              const attraction = clamp(distance * 0.0008 * delta, 0, 0.12);
              const towardHoveredX = hoveredNode.x - otherNode.x;
              const towardHoveredY = hoveredNode.y - otherNode.y;
              const towardDistance = Math.max(Math.sqrt(towardHoveredX * towardHoveredX + towardHoveredY * towardHoveredY), 0.01);
              const tx = towardHoveredX / towardDistance;
              const ty = towardHoveredY / towardDistance;

              otherNode.vx += tx * attraction;
              otherNode.vy += ty * attraction;
              hoveredNode.vx -= tx * attraction * 0.12;
              hoveredNode.vy -= ty * attraction * 0.12;
            }
          }
        }

        for (const edge of state.visibleEdges) {
          const dx = edge.target.x - edge.source.x;
          const dy = edge.target.y - edge.source.y;
          const distance = Math.max(Math.sqrt(dx * dx + dy * dy), 0.01);
          const nx = dx / distance;
          const ny = dy / distance;
          const sameGroup = edge.source.layoutGroupId !== null && edge.source.layoutGroupId === edge.target.layoutGroupId;
          const desired = clamp(
            edge.source.radius + edge.target.radius + 18 + edge.activation * 7,
            sameGroup ? 52 : 66,
            sameGroup ? 130 : 180
          );
          const springWeight = exploded && !sameGroup ? 0.0016 : 0.0036;
          const spring = (distance - desired) * springWeight * edge.weight * delta;

          edge.source.vx += nx * spring;
          edge.source.vy += ny * spring;
          edge.target.vx -= nx * spring;
          edge.target.vy -= ny * spring;
        }

        if (exploded) {
          for (const group of state.visibleGroups) {
            for (const node of group.members) {
              const dx = group.anchorX - node.x;
              const dy = group.anchorY - node.y;
              const distance = Math.max(Math.sqrt(dx * dx + dy * dy), 0.01);
              const nx = dx / distance;
              const ny = dy / distance;
              const limit = Math.max(24, group.targetRadius - node.radius - 16);

              node.vx += dx * 0.0065 * delta;
              node.vy += dy * 0.0065 * delta;

              if (distance > limit) {
                const inward = (distance - limit) * 0.015 * delta;
                node.vx += nx * inward;
                node.vy += ny * inward;
              }
            }
          }
        } else {
          for (const node of nodes) {
            node.vx += -node.x * 0.004 * delta;
            node.vy += -node.y * 0.004 * delta;
          }
        }

        for (const node of nodes) {
          if (node.pinned) {
            node.vx += (node.pinX - node.x) * 0.18 * delta;
            node.vy += (node.pinY - node.y) * 0.18 * delta;
          }

          node.vx *= exploded ? 0.9 : 0.87;
          node.vy *= exploded ? 0.9 : 0.87;
          node.x += node.vx * delta;
          node.y += node.vy * delta;
        }

        if (exploded) {
          refreshGroupGeometry();
        }
      }

      function pickNode(screenX, screenY) {
        const scene = getSceneTransform();
        const world = screenToWorld(screenX, screenY, scene);
        const worldPadding = 8 / Math.max(scene.totalScale, 0.001);

        for (let index = state.visibleNodes.length - 1; index >= 0; index -= 1) {
          const node = state.visibleNodes[index];
          const dx = world.x - node.x;
          const dy = world.y - node.y;
          const radius = node.radius + worldPadding;
          if (dx * dx + dy * dy <= radius * radius) {
            return node;
          }
        }

        return null;
      }

      function distancePointToSegmentSquared(pointX, pointY, startX, startY, endX, endY) {
        const dx = endX - startX;
        const dy = endY - startY;

        if (dx === 0 && dy === 0) {
          const px = pointX - startX;
          const py = pointY - startY;
          return px * px + py * py;
        }

        const t = clamp(((pointX - startX) * dx + (pointY - startY) * dy) / (dx * dx + dy * dy), 0, 1);
        const closestX = startX + dx * t;
        const closestY = startY + dy * t;
        const offsetX = pointX - closestX;
        const offsetY = pointY - closestY;
        return offsetX * offsetX + offsetY * offsetY;
      }

      function pickEdge(screenX, screenY) {
        const scene = getSceneTransform();

        for (let index = state.visibleEdges.length - 1; index >= 0; index -= 1) {
          const edge = state.visibleEdges[index];
          const source = worldToScreen(edge.source.x, edge.source.y, scene);
          const target = worldToScreen(edge.target.x, edge.target.y, scene);
          const lineWidth = clamp((0.9 + edge.weight * 0.7) * scene.totalScale * 0.7, 0.8, 3.2);
          const threshold = Math.max(6, lineWidth + 5);
          const distanceSquared = distancePointToSegmentSquared(
            screenX,
            screenY,
            source.x,
            source.y,
            target.x,
            target.y
          );

          if (distanceSquared <= threshold * threshold) {
            return edge;
          }
        }

        return null;
      }

      function pickGroup(screenX, screenY) {
        if (state.visibleGroups.length === 0) {
          return null;
        }

        const scene = getSceneTransform();
        const world = screenToWorld(screenX, screenY, scene);

        for (let index = state.visibleGroups.length - 1; index >= 0; index -= 1) {
          const group = state.visibleGroups[index];
          const dx = world.x - group.centerX;
          const dy = world.y - group.centerY;
          if (dx * dx + dy * dy <= group.radius * group.radius) {
            return group;
          }
        }

        return null;
      }

      function updateCursor() {
        if (state.pointer.dragging) {
          canvas.style.cursor = "grabbing";
          return;
        }

        if (state.hoveredNode) {
          canvas.style.cursor = nodeHasChildren(state.hoveredNode) ? "pointer" : "grab";
          return;
        }

        if (state.hoveredEdge) {
          canvas.style.cursor = "pointer";
          return;
        }

        if (state.hoveredGroup) {
          canvas.style.cursor = "grab";
          return;
        }

        canvas.style.cursor = "grab";
      }

      function updateHover(screenX, screenY) {
        state.hoveredNode = pickNode(screenX, screenY);
        state.hoveredEdge = state.hoveredNode ? null : pickEdge(screenX, screenY);
        state.hoveredGroup = state.hoveredNode || state.hoveredEdge ? null : pickGroup(screenX, screenY);
        updateCursor();
      }

      function measurePanel(lines, font, lineHeight) {
        ctx.save();
        ctx.font = font;
        let width = 0;

        for (const line of lines) {
          width = Math.max(width, ctx.measureText(line).width);
        }

        ctx.restore();
        return {
          width: width + 20,
          height: lines.length * lineHeight + 14
        };
      }

      function drawPanel(x, y, lines, accent) {
        const font = "12px system-ui, sans-serif";
        const lineHeight = 18;
        const size = measurePanel(lines, font, lineHeight);

        ctx.save();
        ctx.fillStyle = "rgba(0, 0, 0, 0.82)";
        ctx.strokeStyle = accent || "rgba(255, 255, 255, 0.18)";
        ctx.lineWidth = 1;
        ctx.fillRect(x, y, size.width, size.height);
        ctx.strokeRect(x + 0.5, y + 0.5, size.width - 1, size.height - 1);
        ctx.font = font;
        ctx.fillStyle = "#fff";
        ctx.textAlign = "left";
        ctx.textBaseline = "top";

        for (let index = 0; index < lines.length; index += 1) {
          ctx.fillText(lines[index], x + 10, y + 8 + index * lineHeight);
        }

        ctx.restore();
        return size;
      }

      function drawLabelPill(centerX, centerY, text, accent) {
        ctx.save();
        ctx.font = "600 12px system-ui, sans-serif";
        const width = ctx.measureText(text).width + 18;
        const height = 26;
        const x = centerX - width * 0.5;
        const y = centerY - height * 0.5;
        ctx.fillStyle = "rgba(0, 0, 0, 0.78)";
        ctx.strokeStyle = accent;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(x, y, width, height, 13);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#fff";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(text, centerX, centerY + 0.5);
        ctx.restore();
      }

      function drawGroups(scene) {
        for (const group of state.visibleGroups) {
          const position = worldToScreen(group.centerX, group.centerY, scene);
          const radius = group.radius * scene.totalScale;
          const hovered = state.hoveredGroup && state.hoveredGroup.id === group.id;

          ctx.save();
          ctx.globalAlpha = hovered ? 0.16 : 0.1;
          ctx.fillStyle = group.color;
          ctx.beginPath();
          ctx.arc(position.x, position.y, radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();

          ctx.save();
          ctx.strokeStyle = group.color;
          ctx.lineWidth = hovered ? 2.2 : 1.6;
          ctx.setLineDash([8, 8]);
          ctx.beginPath();
          ctx.arc(position.x, position.y, radius, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();

          drawLabelPill(position.x, position.y - radius - 18, group.parent.name, group.color);
        }
      }

      function drawEdges(scene) {
        ctx.save();
        ctx.lineCap = "round";

        for (const edge of state.visibleEdges) {
          const source = worldToScreen(edge.source.x, edge.source.y, scene);
          const target = worldToScreen(edge.target.x, edge.target.y, scene);
          const sameGroup = edge.source.layoutGroupId !== null && edge.source.layoutGroupId === edge.target.layoutGroupId;
          const hovered = state.hoveredEdge === edge;
          const selected = state.selectedEdge === edge;
          const alpha = clamp(
            (0.06 + edge.activation * 0.028) * (sameGroup ? 1 : state.explodeMode ? 0.5 : 1) + (hovered ? 0.16 : 0) + (selected ? 0.22 : 0),
            0.04,
            0.5
          );
          ctx.strokeStyle = selected
            ? edge.source.color
            : hovered
              ? "rgba(255, 255, 255, 0.92)"
              : `rgba(255, 255, 255, ${alpha.toFixed(3)})`;
          ctx.lineWidth = clamp((0.9 + edge.weight * 0.7) * scene.totalScale * 0.7 + (hovered ? 1.2 : 0) + (selected ? 1.8 : 0), 0.8, 5.2);
          ctx.beginPath();
          ctx.moveTo(source.x, source.y);
          ctx.lineTo(target.x, target.y);
          ctx.stroke();
        }

        ctx.restore();
      }

      function drawNodes(scene) {
        const orderedNodes = state.visibleNodes.slice().sort((a, b) => {
          const aPinned = state.selectedNode && a.id === state.selectedNode.id ? 1 : 0;
          const bPinned = state.selectedNode && b.id === state.selectedNode.id ? 1 : 0;
          const aHover = state.hoveredNode && a.id === state.hoveredNode.id ? 1 : 0;
          const bHover = state.hoveredNode && b.id === state.hoveredNode.id ? 1 : 0;
          return aPinned + aHover - (bPinned + bHover);
        });

        ctx.save();
        ctx.textAlign = "center";
        ctx.textBaseline = "top";

        for (const node of orderedNodes) {
          const hovered = state.hoveredNode && node.id === state.hoveredNode.id;
          const selected = state.selectedNode && node.id === state.selectedNode.id;
          const position = worldToScreen(node.x, node.y, scene);
          const hoverScale = hovered ? 1.1 : selected ? 1.04 : 1;
          const radius = node.radius * scene.totalScale * hoverScale;

          if (hovered || selected) {
            ctx.beginPath();
            ctx.arc(position.x, position.y, radius + 7, 0, Math.PI * 2);
            ctx.strokeStyle = hovered && !selected ? "rgba(255, 255, 255, 0.18)" : node.color;
            ctx.lineWidth = hovered && !selected ? 2 : 1.5;
            ctx.stroke();
          }

          ctx.beginPath();
          ctx.arc(position.x, position.y, radius, 0, Math.PI * 2);
          ctx.fillStyle = "#000";
          ctx.fill();
          ctx.strokeStyle = node.color;
          ctx.lineWidth = selected ? 4 : hovered ? 3.2 : 2.3;
          ctx.stroke();

          ctx.fillStyle = "#fff";
          ctx.font = `500 ${clamp(11 * scene.totalScale + 2, 11, 14)}px system-ui, sans-serif`;
          ctx.fillText(node.name, position.x, position.y + radius + 7);
        }

        ctx.restore();
      }

      function drawTooltip(node, scene) {
        if (!node) {
          return;
        }

        const position = worldToScreen(node.x, node.y, scene);
        const radius = node.radius * scene.totalScale;
        const lines = [
          `${node.name} (#${node.id})`,
          `activation ${node.activation.toFixed(2)}`,
          `weight ${node.weight.toFixed(2)}`
        ];

        if (node.hasParent === true && Number.isFinite(node.parentId)) {
          const parent = state.nodeById.get(node.parentId);
          lines.push(`parent ${parent ? parent.name : node.parentId}`);
        }

        if (node.directChildCount > 0) {
          lines.push(`children ${node.directChildCount}`);
        }

        const font = "12px system-ui, sans-serif";
        const lineHeight = 18;
        const size = measurePanel(lines, font, lineHeight);
        const x = clamp(position.x + radius + 14, 12, state.width - size.width - 12);
        const y = clamp(position.y - size.height * 0.5, 12, state.height - size.height - 12);
        drawPanel(x, y, lines, node.color);
      }

      function drawEdgeTooltip(edge, scene) {
        if (!edge) {
          return;
        }

        const source = worldToScreen(edge.source.x, edge.source.y, scene);
        const target = worldToScreen(edge.target.x, edge.target.y, scene);
        const centerX = (source.x + target.x) * 0.5;
        const centerY = (source.y + target.y) * 0.5;
        const lines = [
          `${edge.source.name} -> ${edge.target.name}`,
          `weight ${edge.weight.toFixed(2)}`,
          `activation ${edge.activation.toFixed(2)}`
        ];

        const font = "12px system-ui, sans-serif";
        const lineHeight = 18;
        const size = measurePanel(lines, font, lineHeight);
        const x = clamp(centerX + 16, 12, state.width - size.width - 12);
        const y = clamp(centerY - size.height * 0.5, 12, state.height - size.height - 12);
        drawPanel(x, y, lines, edge.source.color);
      }

      function renderMessage(title, detail) {
        const detailFont = "12px system-ui, sans-serif";
        const detailLines = normalizeMessageLines(detail).flatMap((line) => (
          wrapTextLine(line, detailFont, Math.max(220, state.width - 64))
        ));
        const titleY = detailLines.length > 0
          ? state.height * 0.5 - 16 - ((detailLines.length - 1) * 8)
          : state.height * 0.5;

        ctx.save();
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, state.width, state.height);
        ctx.textAlign = "center";
        ctx.fillStyle = "#fff";
        ctx.font = "600 18px system-ui, sans-serif";
        ctx.fillText(title, state.width * 0.5, titleY);
        if (detailLines.length > 0) {
          ctx.font = detailFont;
          ctx.fillStyle = "rgba(255, 255, 255, 0.82)";
          detailLines.forEach((line, index) => {
            ctx.fillText(line, state.width * 0.5, titleY + 28 + index * 18);
          });
        }
        ctx.restore();
      }

      function render() {
        ctx.clearRect(0, 0, state.width, state.height);
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, state.width, state.height);

        if (state.loading) {
          renderMessage("Loading graph", `Fetching ${GRAPH_ENDPOINT}`);
          return;
        }

        if (state.error) {
          renderMessage(state.error.title, state.error.details);
          return;
        }

        const scene = getSceneTransform();
        if (state.visibleGroups.length > 0) {
          drawGroups(scene);
        }
        drawEdges(scene);
        drawNodes(scene);
        if (state.selectedEdge || state.hoveredEdge) {
          drawEdgeTooltip(state.selectedEdge || state.hoveredEdge, scene);
        } else {
          drawTooltip(state.selectedNode || state.hoveredNode || null, scene);
        }

        if (state.visibleNodes.length === 0) {
          const message = state.explodeMode
            ? "This layer has no deeper children"
            : getFocusNode()
              ? "This node has no direct children"
              : "No root nodes found";
          renderMessage(message, "Click empty background to return");
        }
      }

      function navigateToNode(node, screenX, screenY) {
        state.focusPath = state.focusPath.concat(node);
        state.explodeMode = false;
        state.selectedNode = null;
        state.selectedEdge = null;
        state.hoveredGroup = null;
        recomputeVisibleGraph({
          pulseAnchor: {
            x: screenX,
            y: screenY,
            amplitude: 0.28,
            duration: 280
          }
        });
      }

      function stepBackOneLevel() {
        if (state.explodeMode) {
          state.explodeMode = false;
          state.selectedNode = null;
          state.selectedEdge = null;
          state.hoveredGroup = null;
          recomputeVisibleGraph({
            pulseAnchor: {
              x: state.width * 0.5,
              y: state.height * 0.5,
              amplitude: 0.14,
              duration: 200
            }
          });
          return true;
        }

        if (state.focusPath.length > 0) {
          state.focusPath = state.focusPath.slice(0, -1);
          state.selectedNode = null;
          state.selectedEdge = null;
          state.hoveredGroup = null;
          recomputeVisibleGraph({
            pulseAnchor: {
              x: state.width * 0.5,
              y: state.height * 0.5,
              amplitude: 0.16,
              duration: 220
            }
          });
          return true;
        }

        return false;
      }

      function handleCanvasClick(screenX, screenY) {
        const hitNode = pickNode(screenX, screenY);
        const hitEdge = hitNode ? null : pickEdge(screenX, screenY);

        if (!hitNode && !hitEdge) {
          if (!stepBackOneLevel()) {
            state.selectedNode = null;
            state.selectedEdge = null;
            updateFocusNodeBadge();
          }
          updateCursor();
          return;
        }

        if (nodeHasChildren(hitNode)) {
          navigateToNode(hitNode, screenX, screenY);
          updateCursor();
          return;
        }
